name: 'Terraform CI/CD'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: '.'

jobs:
  terraform-fmt:
    name: 'Format Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: |
          find . -name "*.tf" -exec terraform fmt -check {} \;
        working-directory: ${{ env.WORKING_DIR }}

  terraform-validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  terraform-plan:
    name: 'Plan'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'plan')
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - run: terraform plan -var-file="terraform.tfvars" -out=tfplan
        working-directory: ${{ env.WORKING_DIR }}
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan

  terraform-import:
    name: 'Import Existing Resources'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: production
    outputs:
      import_status: ${{ steps.import.outputs.status }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import ALB
        id: import
        run: |
          echo "Checking if ALB exists..."
          if terraform state list | grep -q "module.alb.aws_lb.this"; then
            echo "ALB already in state, skipping import"
          else
            echo "Importing ALB..."
            terraform import module.alb.aws_lb.this arn:aws:elasticloadbalancing:us-east-1:211125430491:loadbalancer/app/hsbc-gamma-v2-alb/12d89966a57e66da || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import Target Groups
        run: |
          echo "Importing Target Groups..."
          if ! terraform state list | grep -q "module.alb.aws_lb_target_group.web_tg"; then
            terraform import module.alb.aws_lb_target_group.web_tg arn:aws:elasticloadbalancing:us-east-1:211125430491:targetgroup/hsbc-gamma-v2-alb-tg/88b07b024f592fff || true
          fi
          if ! terraform state list | grep -q "module.alb.aws_lb_target_group.app_tg"; then
            terraform import module.alb.aws_lb_target_group.app_tg arn:aws:elasticloadbalancing:us-east-1:211125430491:targetgroup/hsbc-gamma-v2-alb-app-tg/2e7701dbe7274bfb || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import CloudWatch Log Groups
        run: |
          echo "Importing CloudWatch Log Groups..."
          if ! terraform state list | grep -q "module.monitoring.aws_cloudwatch_log_group.web"; then
            terraform import module.monitoring.aws_cloudwatch_log_group.web /hsbc-gamma/web || true
          fi
          if ! terraform state list | grep -q "module.monitoring.aws_cloudwatch_log_group.app"; then
            terraform import module.monitoring.aws_cloudwatch_log_group.app /hsbc-gamma/app || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import IAM Roles
        run: |
          echo "Importing IAM roles..."
          if ! terraform state list | grep -q "module.security.aws_iam_role.web_role"; then
            terraform import module.security.aws_iam_role.web_role hsbc-gamma-v2-web-role || true
          fi
          if ! terraform state list | grep -q "module.security.aws_iam_role.app_role"; then
            terraform import module.security.aws_iam_role.app_role hsbc-gamma-v2-app-role || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import IAM Policy
        run: |
          echo "Importing IAM policy..."
          if ! terraform state list | grep -q "module.security.aws_iam_policy.app_s3_policy"; then
            terraform import module.security.aws_iam_policy.app_s3_policy arn:aws:iam::211125430491:policy/hsbc-gamma-v2-app-s3-policy || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import S3 Buckets
        run: |
          echo "Importing S3 buckets..."
          if ! terraform state list | grep -q "module.s3.aws_s3_bucket.raw"; then
            terraform import module.s3.aws_s3_bucket.raw hsbc-gamma-v2-raw || true
          fi
          if ! terraform state list | grep -q "module.s3.aws_s3_bucket.processed"; then
            terraform import module.s3.aws_s3_bucket.processed hsbc-gamma-v2-processed || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import KMS Alias
        run: |
          echo "Importing KMS alias..."
          if ! terraform state list | grep -q "module.s3.aws_kms_alias.s3_kms_alias"; then
            terraform import module.s3.aws_kms_alias.s3_kms_alias alias/hsbc-gamma-v2-s3 || true
          fi
        working-directory: ${{ env.WORKING_DIR }}
      - name: Verify State
        run: |
          echo "Current state after import:"
          terraform state list
        working-directory: ${{ env.WORKING_DIR }}
      - run: echo "status=success" >> $GITHUB_OUTPUT
        id: set_status

  terraform-apply:
    name: 'Apply'
    runs-on: ubuntu-latest
    needs: [terraform-validate, terraform-plan, terraform-import]
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'))
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIR }}
      - run: |
          echo "Deployment complete."
          echo "Application URL: http://$(terraform output -raw alb_dns_name)"
        working-directory: ${{ env.WORKING_DIR }}

  terraform-destroy:
    name: 'Destroy'
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - run: |
          echo "Emptying S3 buckets..."
          for bucket in $(terraform state list | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/'); do
            aws s3 rm "s3://$bucket" --recursive || true
          done
        working-directory: ${{ env.WORKING_DIR }}
      - run: terraform destroy -auto-approve
        working-directory: ${{ env.WORKING_DIR }}
      - run: echo "Infrastructure destroyed."
        working-directory: ${{ env.WORKING_DIR }}