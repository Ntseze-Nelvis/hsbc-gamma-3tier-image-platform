name: 'Terraform CI/CD'

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy-full'
        type: choice
        options:
          - deploy-base
          - import-resources
          - import-alb
          - deploy-full
          - destroy

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: '.'

jobs:
  terraform-fmt:
    name: 'Format Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: |
          find . -name "*.tf" -exec terraform fmt -check {} \;
        working-directory: ${{ env.WORKING_DIR }}

  terraform-validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  terraform-deploy-base:
    name: 'Step 1: Deploy Base Infrastructure'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event.inputs.action == 'deploy-base' || github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Deploy Base Infrastructure
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.security \
            -target=module.s3
        working-directory: ${{ env.WORKING_DIR }}
      - name: Verify Base State
        run: |
          echo "Base infrastructure deployed"
          terraform state list
        working-directory: ${{ env.WORKING_DIR }}

  terraform-import-alb:
    name: 'Step 2: Import ALB (Critical for for_each)'
    runs-on: ubuntu-latest
    needs: terraform-deploy-base
    if: github.event.inputs.action == 'import-alb' || github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import ALB (First - critical for dependencies)
        run: |
          echo "Importing ALB..."
          terraform import module.alb.aws_lb.this arn:aws:elasticloadbalancing:us-east-1:211125430491:loadbalancer/app/hsbc-gamma-v2-alb/12d89966a57e66da || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import Target Groups (Depends on ALB)
        run: |
          echo "Importing Target Groups..."
          terraform import module.alb.aws_lb_target_group.web_tg arn:aws:elasticloadbalancing:us-east-1:211125430491:targetgroup/hsbc-gamma-v2-alb-tg/88b07b024f592fff || true
          terraform import module.alb.aws_lb_target_group.app_tg arn:aws:elasticloadbalancing:us-east-1:211125430491:targetgroup/hsbc-gamma-v2-alb-app-tg/2e7701dbe7274bfb || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: First Apply to Resolve for_each
        run: |
          echo "First apply to resolve for_each dependencies..."
          terraform apply -auto-approve || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Second Apply to Converge
        run: |
          echo "Second apply to fully converge..."
          terraform apply -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

  terraform-import-remaining:
    name: 'Step 3: Import Remaining Resources'
    runs-on: ubuntu-latest
    needs: terraform-import-alb
    if: github.event.inputs.action == 'import-resources' || github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import CloudWatch Log Groups
        run: |
          echo "Importing CloudWatch Log Groups..."
          terraform import module.monitoring.aws_cloudwatch_log_group.web /hsbc-gamma/web || true
          terraform import module.monitoring.aws_cloudwatch_log_group.app /hsbc-gamma/app || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import IAM Roles
        run: |
          echo "Importing IAM roles..."
          terraform import module.security.aws_iam_role.web_role hsbc-gamma-v2-web-role || true
          terraform import module.security.aws_iam_role.app_role hsbc-gamma-v2-app-role || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import IAM Policy
        run: |
          echo "Importing IAM policy..."
          terraform import module.security.aws_iam_policy.app_s3_policy arn:aws:iam::211125430491:policy/hsbc-gamma-v2-app-s3-policy || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import S3 Buckets
        run: |
          echo "Importing S3 buckets..."
          terraform import module.s3.aws_s3_bucket.raw hsbc-gamma-v2-raw || true
          terraform import module.s3.aws_s3_bucket.processed hsbc-gamma-v2-processed || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import KMS Alias
        run: |
          echo "Importing KMS alias..."
          terraform import module.s3.aws_kms_alias.s3_kms_alias alias/hsbc-gamma-v2-s3 || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Apply to Converge
        run: |
          echo "Applying to converge all resources..."
          terraform apply -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

  terraform-deploy-full:
    name: 'Step 4: Deploy Full Infrastructure'
    runs-on: ubuntu-latest
    needs: [terraform-deploy-base, terraform-import-alb, terraform-import-remaining]
    if: github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Apply Full Infrastructure
        run: terraform apply -auto-approve
        working-directory: ${{ env.WORKING_DIR }}
      - name: Get Application URL
        run: |
          echo "Deployment complete."
          echo "Application URL: http://$(terraform output -raw alb_dns_name)"
        working-directory: ${{ env.WORKING_DIR }}

  terraform-destroy:
    name: 'Destroy'
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Empty S3 Buckets
        run: |
          echo "Emptying S3 buckets..."
          for bucket in $(terraform state list | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/'); do
            aws s3 rm "s3://$bucket" --recursive || true
          done
        working-directory: ${{ env.WORKING_DIR }}
      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ${{ env.WORKING_DIR }}