name: 'Terraform CI/CD'

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy-full'
        type: choice
        options:
          - deploy-base
          - import-resources
          - import-alb
          - deploy-full
          - destroy
          - cleanup-failure

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: '.'
  TF_VAR_project_name: 'hsbc-gamma-v2'
  TF_VAR_aws_region: 'us-east-1'

jobs:
  terraform-fmt:
    name: 'Format Check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: |
          find . -name "*.tf" -exec terraform fmt -check {} \;
        working-directory: ${{ env.WORKING_DIR }}

  terraform-validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: terraform-fmt
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform init
        working-directory: ${{ env.WORKING_DIR }}
      - run: terraform validate
        working-directory: ${{ env.WORKING_DIR }}

  terraform-deploy-base:
    name: 'Step 1: Deploy Base Infrastructure'
    runs-on: ubuntu-latest
    needs: terraform-validate
    if: github.event.inputs.action == 'deploy-base' || github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Deploy Base Infrastructure
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.security \
            -target=module.s3
        working-directory: ${{ env.WORKING_DIR }}
      - name: Verify Base State
        run: |
          echo "Base infrastructure deployed"
          terraform state list
        working-directory: ${{ env.WORKING_DIR }}

  terraform-import-alb:
    name: 'Step 2: Import ALB (Critical for for_each)'
    runs-on: ubuntu-latest
    needs: terraform-deploy-base
    if: github.event.inputs.action == 'import-alb' || github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Get ALB ARN
        id: get_alb
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers --region us-east-1 --profile cloudreality --query "LoadBalancers[?contains(LoadBalancerName, 'hsbc-gamma-v2')].LoadBalancerArn" --output text)
          echo "ALB_ARN=$ALB_ARN" >> $GITHUB_ENV
          echo "Found ALB: $ALB_ARN"
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
      - name: Import ALB
        run: |
          echo "Importing ALB..."
          terraform import module.alb.aws_lb.this ${{ env.ALB_ARN }} || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import Target Groups
        run: |
          echo "Importing Target Groups..."
          for tg in $(aws elbv2 describe-target-groups --region us-east-1 --profile cloudreality --query "TargetGroups[?contains(TargetGroupName, 'hsbc-gamma-v2')].TargetGroupArn" --output text); do
            if [[ $tg == *"-app-tg"* ]]; then
              terraform import module.alb.aws_lb_target_group.app_tg $tg || true
            else
              terraform import module.alb.aws_lb_target_group.web_tg $tg || true
            fi
          done
        working-directory: ${{ env.WORKING_DIR }}
      - name: First Apply to Resolve for_each
        run: |
          echo "First apply to resolve for_each dependencies..."
          terraform apply -auto-approve || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Second Apply to Converge
        run: |
          echo "Second apply to fully converge..."
          terraform apply -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

  terraform-import-remaining:
    name: 'Step 3: Import Remaining Resources'
    runs-on: ubuntu-latest
    needs: terraform-import-alb
    if: github.event.inputs.action == 'import-resources' || github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import CloudWatch Log Groups
        run: |
          echo "Importing CloudWatch Log Groups..."
          terraform import module.monitoring.aws_cloudwatch_log_group.web /hsbc-gamma/web || true
          terraform import module.monitoring.aws_cloudwatch_log_group.app /hsbc-gamma/app || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import IAM Roles
        run: |
          echo "Importing IAM roles..."
          terraform import module.security.aws_iam_role.web_role ${TF_VAR_project_name}-web-role || true
          terraform import module.security.aws_iam_role.app_role ${TF_VAR_project_name}-app-role || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import IAM Policy
        run: |
          echo "Importing IAM policy..."
          terraform import module.security.aws_iam_policy.app_s3_policy arn:aws:iam::211125430491:policy/${TF_VAR_project_name}-app-s3-policy || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import S3 Buckets
        run: |
          echo "Importing S3 buckets..."
          terraform import module.s3.aws_s3_bucket.raw ${TF_VAR_project_name}-raw || true
          terraform import module.s3.aws_s3_bucket.processed ${TF_VAR_project_name}-processed || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Import KMS Alias
        run: |
          echo "Importing KMS alias..."
          terraform import module.s3.aws_kms_alias.s3_kms_alias alias/${TF_VAR_project_name}-s3 || true
        working-directory: ${{ env.WORKING_DIR }}
      - name: Apply to Converge
        run: |
          echo "Applying to converge all resources..."
          terraform apply -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

  terraform-deploy-full:
    name: 'Step 4: Deploy Full Infrastructure'
    runs-on: ubuntu-latest
    needs: [terraform-deploy-base, terraform-import-alb, terraform-import-remaining]
    if: github.event.inputs.action == 'deploy-full'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Apply Full Infrastructure
        run: terraform apply -auto-approve
        working-directory: ${{ env.WORKING_DIR }}
      - name: Get Application URL
        run: |
          echo "Deployment complete."
          echo "Application URL: http://$(terraform output -raw alb_dns_name)"
        working-directory: ${{ env.WORKING_DIR }}

  terraform-destroy:
    name: 'Destroy'
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Empty S3 Buckets
        run: |
          echo "Emptying S3 buckets..."
          for bucket in $(terraform state list | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/'); do
            aws s3 rm "s3://$bucket" --recursive || true
          done
        working-directory: ${{ env.WORKING_DIR }}
      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: ${{ env.WORKING_DIR }}

  cleanup-on-failure:
    name: '🧹 Cleanup on Failure'
    runs-on: ubuntu-latest
    needs: [terraform-deploy-full]
    if: always() && (needs.terraform-deploy-full.result == 'failure' || github.event.inputs.action == 'cleanup-failure')
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
            -backend-config="key=3tier-image-platform/terraform.tfstate" \
            -backend-config="region=us-east-1"
        working-directory: ${{ env.WORKING_DIR }}
      - name: Empty S3 Buckets
        run: |
          echo "Emptying S3 buckets..."
          for bucket in $(terraform state list | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/'); do
            aws s3 rm "s3://$bucket" --recursive || true
          done
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
      - name: Destroy All Resources
        run: |
          echo "⚠️  Deployment failed! Destroying all resources..."
          terraform destroy -auto-approve
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
      - name: Cleanup Remaining Resources
        run: |
          echo "Cleaning up any remaining resources..."
          VPC_NAME="${TF_VAR_project_name}-vpc"
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=tag:Name,Values=$VPC_NAME" --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "")
          
          if [ -n "$VPC_ID" ] && [ "$VPC_ID" != "None" ]; then
            echo "Cleaning up VPC: $VPC_ID"
            for NAT in $(aws ec2 describe-nat-gateways --filter "Name=vpc-id,Values=$VPC_ID" --query 'NatGateways[].NatGatewayId' --output text 2>/dev/null); do
              aws ec2 delete-nat-gateway --nat-gateway-id $NAT 2>/dev/null || true
            done
            sleep 30
            
            for ENI in $(aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=$VPC_ID" --query 'NetworkInterfaces[].NetworkInterfaceId' --output text 2>/dev/null); do
              aws ec2 delete-network-interface --network-interface-id $ENI 2>/dev/null || true
            done
            
            for SUBNET in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query 'Subnets[].SubnetId' --output text 2>/dev/null); do
              aws ec2 delete-subnet --subnet-id $SUBNET 2>/dev/null || true
            done
          fi
          
          # Release Elastic IPs
          for EIP in $(aws ec2 describe-addresses --query 'Addresses[?AssociationId==`null`].AllocationId' --output text 2>/dev/null); do
            aws ec2 release-address --allocation-id $EIP 2>/dev/null || true
          done
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true
      - name: Cleanup Complete
        run: echo "✅ Cleanup completed after failed deployment!"