image:
  name: hashicorp/terraform:1.6
  entrypoint: [""]

stages:
  - validate
  - fmt
  - plan
  - apply
  - destroy

variables:
  TF_ROOT: "."
  TF_IN_AUTOMATION: "true"

cache:
  paths:
    - .terraform

before_script:
  - cd ${TF_ROOT}
  - terraform --version
  - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${TF_STATE_REGION}" -reconfigure

validate:
  stage: validate
  script:
    - terraform validate
  only:
    - main

fmt:
  stage: fmt
  script:
    - terraform fmt -check -recursive
  only:
    - main

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 7 days
  only:
    - main

apply:
  stage: apply
  script:
    - ./apply.sh
  when: manual
  only:
    - main
  environment:
    name: production

destroy:
  stage: destroy
  script:
    - ./destroy.sh
  when: manual
  only:
    - main
  environment:
    name: production
    action: stop
