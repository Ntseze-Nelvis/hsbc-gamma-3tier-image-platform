image:
  name: hashicorp/terraform:1.6
  entrypoint: [""]

stages:
  - validate
  - fmt
  - plan
  - apply

variables:
  TF_ROOT: "."
  TF_IN_AUTOMATION: "true"

before_script:
  - cd $TF_ROOT
  - terraform --version

  # 🔥 FIXED INIT
  - |
    terraform init \
      -backend-config="bucket=${TF_STATE_BUCKET}" \
      -backend-config="key=${TF_STATE_KEY}" \
      -backend-config="region=${AWS_DEFAULT_REGION}"

############################
# VALIDATE
############################
validate:
  stage: validate
  script:
    - terraform validate
  only:
    - merge_requests
    - main

############################
# FORMAT
############################
fmt:
  stage: fmt
  script:
    - terraform fmt -check -recursive
  only:
    - merge_requests
    - main

############################
# PLAN
############################
plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - main

############################
# APPLY
############################
apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
  only:
    - main