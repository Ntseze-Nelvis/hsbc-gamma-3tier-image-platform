image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest

variables:
  # AWS Credentials (from GitLab UI) - KEEP THESE TWO ONLY!
  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  AWS_DEFAULT_REGION: "eu-north-1"
  
  # Terraform Settings
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .terraform

stages:
  - init
  - validate
  - plan
  - deploy
  - destroy

before_script:
  - terraform --version
  # CRITICAL: Create terraform.tfvars from the template file
  - cp terraform.tfvars.example terraform.tfvars
  - echo "✅ Created terraform.tfvars from template"
  - cat terraform.tfvars  # Show it's working (remove in production)
  - terraform init

init:
  stage: init
  script:
    - echo "✅ Terraform initialized"
  only:
    - merge_requests
    - main

validate:
  stage: validate
  script:
    - terraform fmt -check -recursive || terraform fmt -recursive
    - terraform validate
  needs: ["init"]
  only:
    - merge_requests
    - main

plan:
  stage: plan
  script:
    - echo "📁 Planning infrastructure changes..."
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  needs: ["validate"]
  only:
    - merge_requests
    - main

deploy:
  stage: deploy
  script:
    - terraform apply -auto-approve tfplan
    - |
      echo "🔄 Refreshing web instances..."
      aws autoscaling start-instance-refresh \
        --auto-scaling-group-name web-asg \
        --region ${AWS_DEFAULT_REGION} || true
    - |
      echo "🔄 Refreshing app instances..."
      aws autoscaling start-instance-refresh \
        --auto-scaling-group-name app-asg \
        --region ${AWS_DEFAULT_REGION} || true
    - |
      ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "deploying...")
      echo "✅ Application is live at: http://${ALB_DNS}"
  needs: ["plan"]
  when: manual
  only:
    - main

destroy:
  stage: destroy
  script:
    - echo "⚠️  DESTROYING ALL INFRASTRUCTURE!"
    - terraform destroy -auto-approve
  when: manual
  only:
    - main