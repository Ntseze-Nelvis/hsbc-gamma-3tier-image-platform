# GitLab CI/CD Pipeline for HSBC Gamma Dev - 3-Tier Image Platform
# This pipeline is fully configured with your GitLab variables

stages:
  - validate
  - plan
  - apply
  - destroy

variables:
  # Terraform configuration
  TF_ROOT: "terraform/end-to-end-3tier-app-deployment/terraform-3tier-image-platform"
  TF_VERSION: "1.5.0"
  
  # Pass these to Terraform as variables
  TF_VAR_aws_region: "eu-north-1"
  TF_VAR_environment: "dev"
  TF_VAR_project_name: "hsbc-gamma-dev"
  TF_VAR_raw_images_bucket_name: "hsbc-gamma-dev-raw-images"
  TF_VAR_processed_images_bucket_name: "hsbc-gamma-dev-processed-images"
  TF_VAR_web_instance_type: "t3.micro"
  TF_VAR_app_instance_type: "t3.micro"
  TF_VAR_web_desired_capacity: "2"
  TF_VAR_web_min_size: "1"
  TF_VAR_web_max_size: "3"
  TF_VAR_app_desired_capacity: "2"
  TF_VAR_app_min_size: "1"
  TF_VAR_app_max_size: "3"
  TF_VAR_enable_cloudwatch_logs: "true"
  TF_VAR_web_port: "80"
  TF_VAR_app_port: "5000"
  
  # AWS configuration (uses GitLab variables)
  AWS_DEFAULT_REGION: "eu-north-1"
  
  # Terraform Backend Configuration (uses GitLab variables)
  # These are set in your GitLab CI/CD variables
  TF_STATE_BUCKET: ${TF_STATE_BUCKET}
  TF_STATE_KEY: ${TF_STATE_KEY}
  
  # Cache configuration
  TF_CACHE_KEY: "${CI_COMMIT_REF_SLUG}-tf-cache"
  
  # GitLab CI/CD
  GIT_STRATEGY: clone
  GIT_DEPTH: 1

# Cache Terraform plugins to speed up pipeline
cache:
  key: ${TF_CACHE_KEY}
  paths:
    - ${TF_ROOT}/.terraform
  policy: pull-push

# Base template for Terraform jobs
.terraform_template: &terraform_template
  image: hashicorp/terraform:${TF_VERSION}
  before_script:
    - cd ${TF_ROOT}
    - terraform --version
    - |
      echo "Initializing Terraform with S3 backend..."
      terraform init \
        -backend-config="bucket=${TF_STATE_BUCKET}" \
        -backend-config="key=${TF_STATE_KEY}" \
        -backend-config="region=${AWS_DEFAULT_REGION}" \
        -reconfigure
      echo "✅ Terraform initialized"
  cache:
    key: ${TF_CACHE_KEY}
    paths:
      - ${TF_ROOT}/.terraform
    policy: pull
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ============================================
# VALIDATION STAGE
# ============================================

terraform-fmt:
  stage: validate
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - cd ${TF_ROOT}
    - echo "🔍 Checking Terraform formatting..."
    - terraform fmt -check -recursive
    - echo "✅ Terraform formatting is correct"
  only:
    - merge_requests
    - main
    - develop

terraform-validate:
  stage: validate
  <<: *terraform_template
  script:
    - echo "🔍 Validating Terraform configuration..."
    - terraform validate
    - echo "✅ Terraform configuration is valid"
  only:
    - merge_requests
    - main
    - develop

# ============================================
# PLAN STAGE
# ============================================

terraform-plan:
  stage: plan
  <<: *terraform_template
  script:
    - echo "📊 Generating Terraform plan..."
    - terraform plan -out=tfplan -no-color
    - terraform show -no-color tfplan > plan.txt
    - |
      # Generate summary
      echo "## 📋 Terraform Plan Summary" > plan-summary.md
      echo "" >> plan-summary.md
      echo "**Resources to be created:** \`$(grep -c "+ create" plan.txt || echo 0)\`" >> plan-summary.md
      echo "**Resources to be destroyed:** \`$(grep -c "- destroy" plan.txt || echo 0)\`" >> plan-summary.md
      echo "**Resources to be modified:** \`$(grep -c "~ modify" plan.txt || echo 0)\`" >> plan-summary.md
      echo "" >> plan-summary.md
      echo "**Full plan details:**" >> plan-summary.md
      echo '```terraform' >> plan-summary.md
      cat plan.txt >> plan-summary.md
      echo '```' >> plan-summary.md
      
      echo "✅ Plan generated successfully"
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan
      - ${TF_ROOT}/plan.txt
      - ${TF_ROOT}/plan-summary.md
    expire_in: 7 days
    when: always
  only:
    - merge_requests
    - main
    - develop

# ============================================
# APPLY STAGE
# ============================================

terraform-apply:
  stage: apply
  <<: *terraform_template
  script:
    - echo "🚀 Applying Terraform configuration..."
    - |
      # Check if plan file exists
      if [ -f "tfplan" ]; then
        terraform apply -auto-approve tfplan
      else
        echo "⚠️  No plan file found, generating new plan..."
        terraform plan -out=tfplan
        terraform apply -auto-approve tfplan
      fi
    - |
      # Capture outputs
      echo "## 🎉 Deployment Complete" > deployment-info.txt
      echo "" >> deployment-info.txt
      echo "**ALB DNS Name:** $(terraform output -raw alb_dns_name 2>/dev/null || echo 'Not available')" >> deployment-info.txt
      echo "**Raw Bucket ARN:** $(terraform output -raw raw_bucket_arn 2>/dev/null || echo 'Not available')" >> deployment-info.txt
      echo "**Processed Bucket ARN:** $(terraform output -raw processed_bucket_arn 2>/dev/null || echo 'Not available')" >> deployment-info.txt
      echo "**Web ASG Name:** $(terraform output -raw web_asg_name 2>/dev/null || echo 'Not available')" >> deployment-info.txt
      echo "**App ASG Name:** $(terraform output -raw app_asg_name 2>/dev/null || echo 'Not available')" >> deployment-info.txt
      echo "" >> deployment-info.txt
      
      # Display URL
      ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null)
      if [ -n "$ALB_URL" ]; then
        echo "🌐 Application URL: http://$ALB_URL" | tee -a deployment-info.txt
      fi
      
      echo "✅ Terraform apply completed successfully"
  artifacts:
    paths:
      - ${TF_ROOT}/deployment-info.txt
    expire_in: 30 days
  only:
    - main
  when: manual
  environment:
    name: production
    url: http://$(terraform output -raw alb_dns_name 2>/dev/null || echo 'pending')
    on_stop: terraform-destroy

# Apply for develop branch
terraform-apply-dev:
  stage: apply
  <<: *terraform_template
  script:
    - echo "🚀 Applying Terraform configuration to development..."
    - terraform apply -auto-approve
    - echo "✅ Development deployment completed"
    - ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null)
    - echo "🌐 Development URL: http://$ALB_URL"
  only:
    - develop
  when: manual
  environment:
    name: development
    url: http://$(terraform output -raw alb_dns_name 2>/dev/null || echo 'pending')
    on_stop: terraform-destroy-dev

# ============================================
# DESTROY STAGE
# ============================================

terraform-destroy:
  stage: destroy
  <<: *terraform_template
  before_script:
    - cd ${TF_ROOT}
    - terraform init
    - |
      echo "🧹 Emptying S3 buckets before destroy..."
      # Get bucket names from Terraform state
      BUCKETS=$(terraform state list 2>/dev/null | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/')
      
      for bucket in $BUCKETS; do
        if [ -n "$bucket" ]; then
          echo "Emptying bucket: $bucket"
          aws s3 rm "s3://$bucket" --recursive 2>/dev/null || echo "⚠️  Could not empty $bucket (may not exist)"
        fi
      done
  script:
    - echo "⚠️  WARNING: This will destroy ALL infrastructure!"
    - echo "Resources to be destroyed:"
    - terraform state list
    - echo ""
    - echo "Running destroy..."
    - terraform destroy -auto-approve
    - echo "✅ Infrastructure destroyed successfully"
  only:
    - main
  when: manual
  environment:
    name: production
    action: stop
  allow_failure: false

terraform-destroy-dev:
  stage: destroy
  <<: *terraform_template
  before_script:
    - cd ${TF_ROOT}
    - terraform init
    - |
      echo "🧹 Emptying S3 buckets before destroy..."
      BUCKETS=$(terraform state list 2>/dev/null | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/')
      for bucket in $BUCKETS; do
        aws s3 rm "s3://$bucket" --recursive 2>/dev/null || true
      done
  script:
    - echo "Destroying development infrastructure..."
    - terraform destroy -auto-approve
    - echo "✅ Development infrastructure destroyed"
  only:
    - develop
  when: manual
  environment:
    name: development
    action: stop
  allow_failure: false

# ============================================
# POST-DEPLOYMENT VERIFICATION
# ============================================

verify-deployment:
  stage: apply
  image: alpine/curl:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      cd ${TF_ROOT}
      ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null)
      
      if [ -n "$ALB_URL" ]; then
        echo "🔍 Verifying deployment at http://$ALB_URL"
        
        # Wait for ALB to be ready
        echo "Waiting for ALB to be ready..."
        sleep 30
        
        # Test health endpoint
        echo "Testing health endpoint..."
        HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_URL/health")
        
        if [ "$HEALTH_RESPONSE" = "200" ]; then
          echo "✅ Health check passed!"
        else
          echo "⚠️  Health check returned: $HEALTH_RESPONSE"
        fi
        
        # Test root endpoint
        echo "Testing root endpoint..."
        ROOT_RESPONSE=$(curl -s "http://$ALB_URL/" | head -c 100)
        echo "Root response: $ROOT_RESPONSE..."
        
        echo "✅ Deployment verification complete"
      else
        echo "⚠️  No ALB URL found, skipping verification"
      fi
  only:
    - main
  needs:
    - terraform-apply
  allow_failure: true