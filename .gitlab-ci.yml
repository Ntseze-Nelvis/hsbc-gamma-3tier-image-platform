image:
  name: hashicorp/terraform:1.6
  entrypoint: [""]

stages:
  - validate
  - fmt
  - plan
  - apply

variables:
  TF_ROOT: "."
  TF_IN_AUTOMATION: "true"
  TF_VAR_aws_region: "eu-north-1"
  TF_VAR_environment: "dev"
  TF_VAR_project_name: "hsbc-gamma-dev"
  TF_VAR_raw_images_bucket_name: "hsbc-gamma-dev-raw-images"
  TF_VAR_processed_images_bucket_name: "hsbc-gamma-dev-processed-images"

cache:
  paths:
    - .terraform

before_script:
  - cd ${TF_ROOT}
  - terraform --version
  - |
    terraform init \
      -backend-config="bucket=hsbc-gamma-dev-terraform-state" \
      -backend-config="key=3tier-image-platform/terraform.tfstate" \
      -backend-config="region=eu-north-1" \
      -backend-config="encrypt=true" \
      -reconfigure

validate:
  stage: validate
  script:
    - terraform validate
  only:
    - main

fmt:
  stage: fmt
  script:
    - terraform fmt -check -recursive
  only:
    - main

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - main

apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  when: manual
  only:
    - main
