image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest

variables:
  # AWS Credentials (from GitLab UI)
  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  AWS_DEFAULT_REGION: "eu-north-1"
  
  # Terraform Variables (all 21 of them from your GitLab UI)
  TF_VAR_project_name: $TF_VAR_project_name
  TF_VAR_environment: $TF_VAR_environment
  TF_VAR_aws_region: $TF_VAR_aws_region
  TF_VAR_vpc_cidr: $TF_VAR_vpc_cidr
  TF_VAR_azs: $TF_VAR_azs
  TF_VAR_public_subnets: $TF_VAR_public_subnets
  TF_VAR_private_subnets: $TF_VAR_private_subnets
  TF_VAR_raw_images_bucket_name: $TF_VAR_raw_images_bucket_name
  TF_VAR_processed_images_bucket_name: $TF_VAR_processed_images_bucket_name
  TF_VAR_web_instance_type: $TF_VAR_web_instance_type
  TF_VAR_app_instance_type: $TF_VAR_app_instance_type
  TF_VAR_web_port: $TF_VAR_web_port
  TF_VAR_app_port: $TF_VAR_app_port
  TF_VAR_key_pair_name: $TF_VAR_key_pair_name
  TF_VAR_web_desired_capacity: $TF_VAR_web_desired_capacity
  TF_VAR_web_min_size: $TF_VAR_web_min_size
  TF_VAR_web_max_size: $TF_VAR_web_max_size
  TF_VAR_app_max_size: $TF_VAR_app_max_size
  TF_VAR_enable_cloudwatch_logs: $TF_VAR_enable_cloudwatch_logs
  TF_VAR_app_min_size: $TF_VAR_app_min_size
  TF_VAR_app_desired_capacity: $TF_VAR_app_desired_capacity
  TF_VAR_ami_id: $TF_VAR_ami_id
  
  # Terraform Settings
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .terraform

stages:
  - init
  - validate
  - plan
  - deploy
  - destroy

before_script:
  - terraform --version
  - terraform init

init:
  stage: init
  script:
    - echo "✅ Terraform initialized"
  only:
    - merge_requests
    - main

validate:
  stage: validate
  script:
    - terraform fmt -check -recursive || terraform fmt -recursive
    - terraform validate
  needs: ["init"]
  only:
    - merge_requests
    - main

plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  needs: ["validate"]
  only:
    - merge_requests
    - main

deploy:
  stage: deploy
  script:
    - terraform apply -auto-approve tfplan
    - |
      echo "🔄 Refreshing web instances..."
      aws autoscaling start-instance-refresh \
        --auto-scaling-group-name web-asg \
        --region ${AWS_DEFAULT_REGION} || true
    - |
      echo "🔄 Refreshing app instances..."
      aws autoscaling start-instance-refresh \
        --auto-scaling-group-name app-asg \
        --region ${AWS_DEFAULT_REGION} || true
    - |
      ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "deploying...")
      echo "✅ Application is live at: http://${ALB_DNS}"
  needs: ["plan"]
  when: manual
  only:
    - main

destroy:
  stage: destroy
  script:
    - echo "⚠️  DESTROYING ALL INFRASTRUCTURE!"
    - terraform destroy -auto-approve
  when: manual
  only:
    - main