image:
  name: hashicorp/terraform:1.6
  entrypoint: [""]

stages:
  - validate
  - fmt
  - plan
  - apply
  - destroy

variables:
  TF_ROOT: "."
  TF_IN_AUTOMATION: "true"

cache:
  paths:
    - .terraform

before_script:
  - cd ${TF_ROOT}
  - terraform --version
  - terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="key=${TF_STATE_KEY}" -backend-config="region=${TF_STATE_REGION}" -reconfigure
  - echo "‚úÖ Terraform initialized"

validate:
  stage: validate
  script:
    - terraform validate
  only:
    - main

fmt:
  stage: fmt
  script:
    - terraform fmt -check -recursive
  only:
    - main

plan:
  stage: plan
  script:
    - terraform plan -var-file="terraform.tfvars" -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 7 days
  only:
    - main

apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
    - echo "‚úÖ Deployment complete!"
    - ALB_URL=$(terraform output -raw alb_dns_name 2>/dev/null || echo "pending")
    - echo "Ūľź URL: http://$ALB_URL"
  when: manual
  only:
    - main
  environment:
    name: production

destroy:
  stage: destroy
  script:
    - echo "‚ö†ÔłŹ  Destroying all infrastructure..."
    - for bucket in $(terraform state list 2>/dev/null | grep aws_s3_bucket | sed 's/.*\.\(.*\)/\1/'); do aws s3 rm "s3://$bucket" --recursive || true; done
    - terraform destroy -auto-approve
    - echo "‚úÖ Infrastructure destroyed!"
  when: manual
  only:
    - main
  environment:
    name: production
    action: stop
