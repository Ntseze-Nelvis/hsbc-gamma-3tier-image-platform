image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest

variables:
  # AWS Credentials (from GitLab UI)
  AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
  AWS_DEFAULT_REGION: "eu-north-1"
  
  # Terraform Settings
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .terraform

stages:
  - init
  - validate
  - plan
  - deploy
  - destroy

before_script:
  - terraform --version
  # Create terraform.tfvars from template (for plan/apply stages)
  - cp terraform.tfvars.example terraform.tfvars || echo "⚠️ No template found, using existing tfvars"
  - echo "✅ Environment prepared"
  - terraform init

init:
  stage: init
  script:
    - echo "✅ Terraform initialized"
  only:
    - merge_requests
    - main

validate:
  stage: validate
  script:
    - terraform fmt -check -recursive || terraform fmt -recursive
    - terraform validate  # No -var-file needed here
  needs: ["init"]
  only:
    - merge_requests
    - main

plan:
  stage: plan
  script:
    - echo "📁 Current directory contents:"
    - ls -la
    - echo "📄 terraform.tfvars content:"
    - cat terraform.tfvars || echo "⚠️ terraform.tfvars not found!"
    - terraform plan -var-file=terraform.tfvars -out=tfplan
  artifacts:
    paths:
      - tfplan
  needs: ["validate"]
  only:
    - merge_requests
    - main

deploy:
  stage: deploy
  script:
    - terraform apply -var-file=terraform.tfvars -auto-approve tfplan
    - |
      echo "🔄 Refreshing web instances..."
      aws autoscaling start-instance-refresh \
        --auto-scaling-group-name web-asg \
        --region ${AWS_DEFAULT_REGION} || true
    - |
      echo "🔄 Refreshing app instances..."
      aws autoscaling start-instance-refresh \
        --auto-scaling-group-name app-asg \
        --region ${AWS_DEFAULT_REGION} || true
    - |
      ALB_DNS=$(terraform output -raw alb_dns_name 2>/dev/null || echo "deploying...")
      echo "✅ Application is live at: http://${ALB_DNS}"
  needs: ["plan"]
  when: manual
  only:
    - main

destroy:
  stage: destroy
  script:
    - echo "⚠️  DESTROYING ALL INFRASTRUCTURE!"
    - terraform destroy -var-file=terraform.tfvars -auto-approve
  when: manual
  only:
    - main