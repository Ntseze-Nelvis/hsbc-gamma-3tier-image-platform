stages:
  - validate
  - plan
  - apply

variables:
  TF_ROOT: "."
  TF_VERSION: "1.5.0"
  TF_VAR_aws_region: "eu-north-1"
  TF_VAR_environment: "dev"
  TF_VAR_project_name: "hsbc-gamma-dev"
  TF_VAR_raw_images_bucket_name: "hsbc-gamma-dev-raw-images"
  TF_VAR_processed_images_bucket_name: "hsbc-gamma-dev-processed-images"
  TF_VAR_web_instance_type: "t3.micro"
  TF_VAR_app_instance_type: "t3.micro"
  TF_VAR_web_desired_capacity: "2"
  TF_VAR_web_min_size: "1"
  TF_VAR_web_max_size: "3"
  TF_VAR_app_desired_capacity: "2"
  TF_VAR_app_min_size: "1"
  TF_VAR_app_max_size: "3"

cache:
  paths:
    - .terraform

before_script:
  - echo "Current directory: $(pwd)"
  - echo "Listing Terraform files:"
  - ls -la *.tf 2>/dev/null || echo "No tf files found"
  - terraform init

terraform-fmt:
  stage: validate
  script:
    - terraform fmt -check -recursive

terraform-validate:
  stage: validate
  script:
    - terraform validate

terraform-plan:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    paths:
      - tfplan
  only:
    - merge_requests
    - main

terraform-apply:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  only:
    - main
  when: manual
  environment:
    name: production

terraform-apply-dev:
  stage: apply
  script:
    - terraform apply -auto-approve
  only:
    - develop
  when: manual
  environment:
    name: development
